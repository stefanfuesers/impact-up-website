 .node{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .9s cubic-bezier(.2,.8,.3,1) forwards;animation-delay:var(--d)}
 @keyframes pop{0%{opacity:0;transform:scale(0)}70%{opacity:1;transform:scale(1.18)}100%{opacity:.92;transform:scale(1)}}
 .tw{animation:pop .9s cubic-bezier(.2,.8,.3,1) forwards,tw 5.5s ease-in-out infinite;animation-delay:var(--d),calc(var(--d) + 1.1s)}
 @keyframes tw{0%,100%{opacity:.5}50%{opacity:1}}
 .breathe{animation:breathe 10s ease-in-out infinite}
 @keyframes breathe{0%,100%{opacity:.9}50%{opacity:1}}
</style>

<style>
:root{
  --c-gold:#C9A961; --c-moss-deep:#2D4A2B; --c-moss-500:#4A6843; --c-moss-300:#6B8A5A;
  --c-leaf:#7BA05B; --c-stone:#B8855E; --c-stone-300:#C9A47E; --c-stone-700:#8A5E3B;
  --c-parchment:#F4ECD8; --c-parchment-100:#FAF6EA; --c-parchment-300:#E8DDB8;

  --font-body:'Inter',system-ui,sans-serif;
  --radius:2px; --shadow:0 2px 12px rgba(31,26,20,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--c-parchment);color:var(--c-ink);font-family:var(--font-body);font-size:1.0625rem;line-height:1.65}
a{color:var(--c-ink);text-decoration:underline;text-decoration-color:var(--c-gold);text-underline-offset:2px}

/* ---------- Kanonische Site-Nav (sticky) ---------- */
.sitenav{position:sticky;top:0;z-index:1000;display:flex;flex-wrap:wrap;align-items:center;gap:8px 18px;background:rgba(21,39,26,.92);backdrop-filter:blur(8px);padding:10px 24px;font-size:.9rem;border-bottom:1px solid rgba(201,169,97,.35)}
.sitenav a{color:var(--c-parchment);text-decoration:none}
.sitenav a:hover{text-decoration:underline;text-decoration-color:var(--c-gold);text-underline-offset:3px}
.sitenav .nv-group{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center}
.sitenav .nv-right{margin-left:auto}
.sitenav .nv-current{color:var(--c-gold);font-weight:600}
.sitenav .nv-drop{position:relative}
.sitenav .nv-drop>a::after{content:" \25BE";color:var(--c-gold)}
.sitenav .nv-drop>ul{position:absolute;left:0;top:100%;min-width:250px;list-style:none;margin:6px 0 0;padding:8px 0;background:var(--c-moss-deep);border:1px solid rgba(201,169,97,.4);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.32);z-index:1001;display:none}
.sitenav .nv-drop:hover>ul,.sitenav .nv-drop:focus-within>ul{display:block}
.sitenav .nv-drop a{display:block;padding:8px 16px;font-size:.88rem;white-space:nowrap}
.sitenav .nv-lang a{border:1px solid var(--c-gold);border-radius:var(--radius);padding:2px 9px;color:var(--c-gold)}
.nv-menu{display:flex;flex-wrap:wrap;align-items:center;gap:8px 18px;flex:1}
@media(max-width:760px){.sitenav{font-size:.82rem;padding:8px 14px}.sitenav .nv-right{margin-left:0}}

/* ---------- Mobil-Nav: Burger + aufklappbares Menü (<820px) ---------- */
.nv-burger{display:none;margin-left:auto;background:none;border:none;padding:8px;cursor:pointer;flex-direction:column;justify-content:center;gap:5px;width:40px;height:36px;flex:none}
.nv-burger span{display:block;height:2px;width:100%;background:var(--c-parchment);border-radius:2px;transition:transform .2s ease,opacity .2s ease}
.nv-burger[aria-expanded="true"] span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nv-burger[aria-expanded="true"] span:nth-child(2){opacity:0}
.nv-burger[aria-expanded="true"] span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:820px){

  .nv-menu{display:none;width:100%;flex-basis:100%}

  .sitenav .nv-menu .nv-group{display:flex;flex-direction:column;align-items:flex-start;gap:2px;width:100%}
  .sitenav .nv-right{margin-left:0}

main{max-width:860px;margin:0 auto;padding:32px 20px 96px}
.eyebrow{font-size:.8125rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--c-stone-700);margin-bottom:6px}
h1{font-family:var(--font-display);font-weight:600;font-size:clamp(1.7rem,4vw,2.4rem);line-height:1.15;margin-bottom:10px}
h2{font-family:var(--font-display);font-weight:600;font-size:1.45rem;margin:26px 0 8px}
.lead{max-width:62ch;margin-bottom:16px}
.hint{font-size:.9rem;color:var(--c-stone-700)}

.progress{display:flex;gap:4px;margin:22px 0 28px}
.progress span{flex:1;height:6px;background:var(--c-parchment-300);border-radius:var(--radius)}
.progress span.done{background:var(--c-gold)}
.progress span.now{background:var(--c-moss-500)}

.card{background:var(--c-parchment-100);border:1px solid var(--c-parchment-300);border-left:3px solid var(--c-gold);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
.frage{font-weight:600;font-size:1.05rem;margin-bottom:4px}
.frage .nr{color:var(--c-stone-700);font-weight:600;font-size:.8rem;letter-spacing:.08em;margin-right:8px}
.sub{font-size:.9rem;color:var(--c-stone-700);margin-bottom:12px}
.gruppentitel{font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--c-stone-700);margin:12px 0 6px}

.opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.opts button{font-family:var(--font-body);font-size:.92rem;padding:9px 14px;border:1px solid var(--c-stone-300);background:transparent;border-radius:var(--radius);cursor:pointer;color:var(--c-ink)}
.opts button:hover{border-color:var(--c-gold)}
.opts button.sel{background:var(--c-moss-deep);color:var(--c-parchment);border-color:var(--c-moss-deep)}
textarea,input[type=text],input[type=number],input[type=time]{width:100%;font-family:var(--font-body);font-size:.95rem;padding:10px;border:1px solid var(--c-stone-300);border-radius:var(--radius);background:#FBF8EF;color:var(--c-ink)}
textarea{min-height:74px;resize:vertical}
textarea:focus,input:focus{outline:2px solid var(--c-gold)}
/* Mobil: mind. 16px in Formularfeldern, sonst zoomt iOS Safari bei jedem Fokus */
@media(max-width:480px){textarea,input[type=text],input[type=number],input[type=time]{font-size:16px}}
.inline{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.inline label{font-size:.9rem}
.inline input[type=text].kurzfeld{width:150px}
.inline input[type=time]{width:130px}
.vorschlag{font-size:.9rem;background:var(--c-parchment-300);border-radius:var(--radius);padding:10px 12px;margin:8px 0 4px}

.nav{display:flex;justify-content:space-between;margin-top:26px}
button.primary,button.secondary{font-family:var(--font-body);font-weight:600;font-size:1rem;padding:12px 24px;border-radius:var(--radius);cursor:pointer}
button.primary{background:var(--c-moss-deep);color:var(--c-parchment);border:1px solid var(--c-gold)}
button.primary:hover{background:var(--c-gold);color:var(--c-ink)}
button.secondary{background:transparent;border:1px solid var(--c-gold);color:var(--c-ink)}
button.secondary:hover{background:var(--c-parchment-300)}
button:disabled{opacity:.45;cursor:not-allowed}
.pflicht{color:var(--c-monk);font-size:.85rem;display:none;margin-top:8px}

/* ---------- Bogen ---------- */
.kontextzeile{background:var(--c-moss-deep);color:var(--c-parchment);border-radius:var(--radius);padding:16px 20px;margin-bottom:22px;font-size:.92rem}
.kontextzeile b{color:var(--c-gold)}
.block{background:var(--c-parchment-100);border:1px solid var(--c-parchment-300);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;padding:16px 20px;page-break-inside:avoid}
.block.pause{background:var(--c-parchment-300);border-style:dashed;box-shadow:none}
.block .kopf{display:flex;gap:14px;align-items:baseline;flex-wrap:wrap}
.block .zeit{font-family:var(--font-display);font-weight:600;font-size:1.15rem;color:var(--c-moss-deep);white-space:nowrap}
.block .dauer{font-size:.8rem;color:var(--c-stone-700)}
.block .titel{font-family:var(--font-display);font-weight:600;font-size:1.25rem}
.block .kurz{margin:6px 0 2px;font-size:.95rem}
.block .idee{font-size:.9rem;margin-top:6px;color:var(--c-ink)}
.block .idee b{color:var(--c-stone-700)}
.wsatz{font-size:.95rem;background:var(--c-parchment-300);border-left:3px solid var(--c-gold);border-radius:var(--radius);padding:8px 12px;margin:8px 0;font-style:italic}

/* Übungs-Box: das Herzstück, deutlich abgehoben */
.uebung{border:2px solid var(--c-gold);border-left:6px solid var(--c-gold);background:var(--c-parchment-100);margin:18px 0;padding:20px 22px;page-break-inside:avoid;box-shadow:var(--shadow)}
.uebung .ukopf{display:flex;gap:14px;align-items:baseline;flex-wrap:wrap;border-bottom:1px solid var(--c-parchment-300);padding-bottom:8px;margin-bottom:10px}
.uebung .uname{font-family:var(--font-display);font-weight:600;font-size:1.5rem;color:var(--c-moss-deep)}
.uebung .ulabel{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--c-stone-700);margin-left:auto}
.uebung h4{font-family:var(--font-body);font-weight:600;font-size:.95rem;margin:12px 0 4px;color:var(--c-stone-700)}
.uebung ol,.uebung ul{margin:4px 0 4px 22px;font-size:.95rem}
.uebung .phasenzeile{font-size:.85rem;color:var(--c-stone-700);margin-top:2px}
.uebung .quel{font-size:.88rem;margin-top:12px}
.uebung .warum{font-size:.95rem;background:var(--c-parchment-300);border-radius:var(--radius);padding:8px 12px;margin:8px 0}
.uebung .warum b{color:var(--c-stone-700)}
.uebung .achtung{font-size:.9rem;color:var(--c-monk);margin-top:8px}


/* Brille-Kasten: Rahmenmodell / Haltung als Hintergrund, nie als Übung */
.brille{background:var(--c-parchment-100);border:1px solid var(--c-purple-deep);border-left:5px solid var(--c-purple-deep);border-radius:var(--radius);padding:16px 20px;margin:18px 0;page-break-inside:avoid}
.brille .btitel{font-family:var(--font-display);font-weight:600;font-size:1.2rem;color:var(--c-purple-deep)}
.brille .blabel{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--c-stone-700)}
.brille p{font-size:.92rem;margin-top:6px}
.brille .quel{font-size:.85rem;margin-top:8px}

.begleit{background:var(--c-parchment-100);border:1px solid var(--c-stone-300);border-radius:var(--radius);padding:18px 22px;margin-bottom:22px}
.begleit h3{font-family:var(--font-display);font-weight:600;font-size:1.25rem;margin-bottom:8px}
.begleit li{margin:6px 0 6px 20px;font-size:.95rem}

.cta{background:var(--c-moss-deep);color:var(--c-parchment);border-radius:var(--radius);padding:22px 24px;margin:26px 0;page-break-inside:avoid}
.cta .ctitel{font-family:var(--font-display);font-weight:600;font-size:1.35rem;color:var(--c-gold);margin-bottom:6px}
.cta a{color:var(--c-parchment);text-decoration-color:var(--c-gold)}
.cta p{font-size:.95rem}

.tagkopf{font-family:var(--font-display);font-weight:600;font-size:1.5rem;color:var(--c-purple-deep);margin:26px 0 12px}
.aktionen{display:flex;gap:10px;flex-wrap:wrap;margin:26px 0}
.fussnote{font-size:.85rem;color:var(--c-stone-700);max-width:62ch}
.offen{border-left:6px solid var(--c-monk)}
.offen .uname{color:var(--c-monk)}

/* ---------- Druck (weiß, klar) ---------- */
.printkopf{display:none}

  .uebung{border:1.5px solid #C9A961;border-left:5px solid #C9A961}
  .block.pause{background:#f4f4f4}
  .wsatz,.uebung .warum{background:#f4f4f4}
  .brille{background:#fff;border-color:#4A2B5C}
  .kontextzeile{background:#fff;color:#1F1A14;border:1.5px solid #C9A961}
  .kontextzeile b{color:#8A5E3B}
  .cta{background:#fff;color:#1F1A14;border:1.5px solid #C9A961}
  .cta .ctitel{color:#8A5E3B}
  .cta a{color:#1F1A14}
}

<script>

   für beliebig viele Sessions frei (Button "Neue Session planen"). */

  if(_p.get("frei")==="wirkungsraum"){ localStorage.setItem(LS_FREI,"1"); history.replaceState(null,"",location.pathname); }
}catch(e){}
let _runCounted = false;
/* =====================================================================
   Session-Werkstatt · Version 2 (Engine V2)
   Zwei Pfade: Gesprächsleitfaden (1:1 / Coaching / kleine Klärung)

/* ---------- Pfad-Weiche ---------- */
function istGespraech(){
  if(A.anlassTyp==="schwieriges_gespraech"||A.anlassTyp==="coaching") return true;
  if(A.anlassTyp==="konfliktklaerung"){
    const g = parseGroesse(A.konfliktGroesse);
    return !!(g && g.bis<=3);
  }
  return false;
}
/* Gesprächsart fürs Wording: Kündigung vs. Kritik vs. Coaching vs. Konflikt */
function gespraechsArt(){
  if(A.anlassTyp==="coaching") return "coaching";
  if(A.anlassTyp==="konfliktklaerung") return "konflikt";
  const t = (A.anlass||"").toLowerCase();
  if(/künd|kuend|trennung|beend|entlass|freistell|vertrag.*nicht.*verläng|nicht verläng/.test(t)) return "kuendigung";
  if(/schlechte nachricht|absage|streich|budget.*weg|stelle.*weg/.test(t)) return "kuendigung";
  return "kritik";
}

/* ---------- Gruppengröße als Spanne ---------- */
function parseGroesse(text){
  if(!text) return null;
  let t = String(text).toLowerCase().replace(/ca\.?|etwa|ungefähr|rund|~/g,"").trim();
  let m = t.match(/(\d+)\s*(?:[-–—]|bis)\s*(\d+)/);
  if(m){ const a=parseInt(m[1],10), b=parseInt(m[2],10); return {von:Math.min(a,b), bis:Math.max(a,b)}; }
  m = t.match(/(\d+)/);
  if(m){ const n=parseInt(m[1],10); return {von:n, bis:n}; }
  return null;
}
function groesse(){ return parseGroesse(A.groesse) || {von:8, bis:8}; }
function groessenKlasse(g){
  g = g || groesse();
  if(g.bis<=2) return "zu_zweit";
  if(g.bis<=6) return "klein";
  if(g.bis<=14) return "mittel";
  if(g.bis<=30) return "gross";
  return "sehr_gross";
}
function groesseLabel(){
  const g = groesse();
  return g.von===g.bis ? `${g.von} Personen` : `${g.von}–${g.bis} Personen`;
}

/* ---------- Kontext für alle Texte ---------- */
function ctx(ersterTag, letzterTag){
  return {anlass:A.anlassTyp, klasse:groessenKlasse(), stimmung:A.stimmung||"neutral", energie:A.energie||"mitten",
          online:A.ort==="online", ersterTag:ersterTag!==false, letzterTag:letzterTag!==false, g:groesse()};
}

function baueSchablone(){
  const d = A.dauer, s = [];
  const klein = ["zu_zweit","klein"].includes(groessenKlasse());
  const krise = A.anlassTyp==="krisensitzung";
  const push=(slot,min,label)=>s.push({slot,min,label});

  if(d==="m60"){
    push("ankommen", krise?6:(klein?4:8), labelAnkommen());
    push("zweck", krise?6:(klein?4:7), labelZweck());
    push("uebung", krise?34:(klein?40:31), "Kern der Arbeit");
    push("ernte", krise?8:6, labelErnte());
    push("checkout", krise?6:(klein?6:8), labelCheckout());
  } else if(d==="m120"||d==="serie"){
    push("ankommen", klein?6:10, labelAnkommen());
    push("zweck", klein?6:10, labelZweck());
    push("uebung", 40, "Kern der Arbeit I");
    push("pause", 15, "Pause");
    push("ernte", 10, labelErnte());
    push("uebung2", 15, "Kern der Arbeit II – kurz");
    push("feedback", 5, "Kurze Rückmeldung");
    push("checkout", klein?8:10, labelCheckout());
  } else if(d==="halbtag"){
    push("ankommen", klein?8:15, labelAnkommen());
    push("zweck", klein?10:15, labelZweck());
    push("uebung", 60, "Kern der Arbeit I");
    push("pause", 20, "Pause");
    push("ernte", 15, labelErnte());
    push("uebung", 55, "Kern der Arbeit II");
    if(A.appetit==="voll") push("uebung2", 20, "Bonus-Element – kurz");
    push("feedback", 10, "Rückmeldungen");
    push("checkout", klein?10:15, labelCheckout());
  } else if(d==="tag"){ tagesplan(s, true, true); }
  else if(d==="t15"){
    s.push({tag:1}); tagesplan(s, true, false);
    s.push({tag:2});
    push("ankommen", 15, "Ankommen Tag 2");
    push("uebung", 75, "Kern des Vormittags");
    push("pause", 20, "Pause");
    push("ernte", 20, labelErnte());
    push("feedback", 15, "Rückmeldungen");
    push("checkout", 20, "Abschluss & Check-out");
  } else if(d==="t2"){
    s.push({tag:1}); tagesplan(s, true, false);
    s.push({tag:2}); tagesplan(s, false, true);
  }
  return s;
}
function tagesplan(s, erster, letzter){
  const klein = ["zu_zweit","klein"].includes(groessenKlasse());
  const push=(slot,min,label)=>s.push({slot,min,label});
  push("ankommen", erster?(klein?12:20):12, erster?labelAnkommen():"Ankommen Tag 2");
  if(erster) push("zweck", 20, "Zweck, Bogen & gemeinsame Verabredungen");
  push("uebung", 90, "Kern des Vormittags");
  push("pause", 20, "Pause");
  push("ernte", 25, labelErnte());
  push("mittag", 60, "Mittagspause");
  push("energiemoment", 10, "Ankommen nach dem Mittag");
  push("uebung", 90, "Kern des Nachmittags");
  if(A.appetit==="voll") push("uebung2", 20, "Bonus-Element – kurz");
  push("pause", 20, "Pause");
  if(letzter){ push("ernte", 25, labelErnte()); push("feedback", 15, "Rückmeldungen"); push("checkout", 25, "Abschluss & Check-out"); }
  else { push("ernte", 20, "Auswertung"); push("checkout", 15, "Tagesabschluss – leicht"); }
}
function labelAnkommen(){
  if(A.anlassTyp==="krisensitzung") return "Blitzrunde: Was wissen wir?";
  return ["zu_zweit","klein"].includes(groessenKlasse()) ? "Check-in" : "Ankommen";
}
function labelZweck(){
  if(A.anlassTyp==="krisensitzung") return "Gemeinsames Bild & Priorität";
  if(A.anlassTyp==="entscheidungstreffen") return "Die Frage, die Kriterien, der Weg";
  if(A.anlassTyp==="konfliktklaerung") return "Rahmen & Verabredungen";
  return "Worum es heute geht";
}
function labelErnte(){
  if(A.anlassTyp==="krisensitzung") return "Beschlüsse sichern";
  return ["zu_zweit","klein"].includes(groessenKlasse()) ? "Austausch & Sichern" : "Auswertung & Austausch";
}
function labelCheckout(){
  if(A.anlassTyp==="krisensitzung") return "Nächster Kontaktpunkt";
  if(A.anlassTyp==="regeltermin") return "Check-out – ein Satz";
  return "Check-out";
}

    if(ANKOMMEN_ANLASS[c.anlass] && ["gross","sehr_gross"].includes(c.klasse) && c.anlass!=="krisensitzung") t += " Bei dieser Größe: alle über eine stille oder paarweise Form beteiligen statt einer langen Runde.";

      if(ANKOMMEN_STIMMUNG[c.stimmung]) t += ANKOMMEN_STIMMUNG[c.stimmung];
      if(ANKOMMEN_ENERGIE[c.energie]) t += ANKOMMEN_ENERGIE[c.energie];

    return t;
  }

    t = ZWECK_TEXT[c.anlass] || "Worum geht es heute, warum lohnt sich die gemeinsame Zeit, was ist am Ende anders? Den Bogen des Treffens einmal zeigen.";
    if(c.stimmung==="genervt") t += " Und weil die Gruppe das Thema schon kennt: benenn ausdrücklich, was heute anders läuft als die letzten Male.";

  }
  if(slot==="ernte"){
    t = ERNTE_TEXT_ANLASS[c.anlass] || "Ergebnisse gehören allen: kurz sichtbar machen, was entstanden ist, Austausch zulassen.";
    if(["zu_zweit","klein"].includes(c.klasse) && !["krisensitzung","konfliktklaerung"].includes(c.anlass)) t += ERNTE_KLEIN_ZUSATZ;
    return t;

  if(slot==="feedback") return "Kurze Rückmeldung zur gemeinsamen Arbeit: Was hat gut getan, was braucht es beim nächsten Mal? Auch: Was haben wir voneinander gelernt?";
  if(slot==="energiemoment") return "Direkt nach dem Essen ist die Aufmerksamkeit im Keller – erst den Körper abholen, dann den Kopf: kurz aufstehen, raus wenn möglich, drei Minuten."+(c.online?" Online: Kameras dürfen kurz aus, Aufstehen ausdrücklich erwünscht.":"");

function zielModi(){
  const m = new Set();
  A.ergebnistypen.forEach(t=>{const e=ERGEBNISTYPEN[t]; if(e) e.modi.forEach(x=>m.add(x));});
  if(m.size===0) m.add("klaerung");
  return [...m];
}
function maxSelbstoeffnung(spaet){
  if(A.vertrauen==="belastet") return spaet?1:0;
  if(A.vertrauen==="duenn") return 1;
  if(A.bekannt==="neu") return spaet?2:1;
  return 2;
}
const UMBRELLA = new Set(["liberating-structures","new-games","trust-uebungen","check-in-rituale"]);
const NUR_ONLINE = new Set(["online-energizer-scavenger-hunt","online-energizer-stretch-shake","online-energizer-virtual-wave","breakout-design","digitales-whiteboard-arbeiten","online-check-in-varianten","kamera-energie-hygiene"]);
const NICHT_ALS_UEBUNG = new Set(["digitales-whiteboard-arbeiten","breakout-design","kamera-energie-hygiene","timeboxing"]);

function stimmungDatenWerte(){
  return STIMMUNG_DATEN[A.stimmung||"neutral"]||[];
}
function methodeStimmungen(m){
  return (m.stimmung_geeignet||[]).map(x=>x==="müde"?"muede":x);
}
function passtGroesse(m, g){
  return m.gruppe_min<=g.bis && m.gruppe_max>=g.von;
}

function kandidatenFuerUebung(maxMin, schonGewaehlt, spaet){
  const genervt = (A.stimmung==="genervt");
  const zm = zielModi(), maxSO = maxSelbstoeffnung(spaet);
  const kernTypen = (A.phase==="reflektieren") ? ["kern","reflexion"] : ["kern"];
  const g = groesse();
  const stw = stimmungDatenWerte();

  let liste = METHODEN.filter(m=>{
    if(UMBRELLA.has(m.id) || NICHT_ALS_UEBUNG.has(m.id)) return false;
    if(m.typ==="haltung"||m.typ==="rahmenmodell") return false;        // nie als Übung
    if(A.ort!=="online" && NUR_ONLINE.has(m.id)) return false;
    if(!m.blocktyp.some(t=>kernTypen.includes(t))) return false;
    if(schonGewaehlt.has(m.id)) return false;
    if(m.dauer_min > maxMin) return false;
    if(m.dauer_max < Math.max(12, maxMin*0.3)) return false;
    if(!passtGroesse(m, g)) return false;
    if(A.ort==="online" && (m.online==="nein"||m.braucht_raum)) return false;
    if(SO_RANG[m.selbstoeffnung] > maxSO) return false;
    return true;
  });

  const punkte = m=>{
    let p = 0;
    // Haupthebel V2: Anlass-Match
    const at = m.anlass_typen||[];
    if(at.includes(A.anlassTyp)) p+=4; else if(at.length) p-=2;
    // Stimmung
    const ms = methodeStimmungen(m);
    if(stw.some(s=>ms.includes(s))) p+=1.5;
    if(A.energie==="muede"||A.energie==="serie"){ if(ms.includes("muede")) p+=0.5; }
    if(A.energie==="frisch" && ms.includes("frisch")) p+=0.3;
    // Genervt vom Thema: Regeltermin-Standards meiden
    if(genervt && at.includes("regeltermin") && A.anlassTyp!=="regeltermin") p-=1.5;
    // Bewährte V1-Gewichte
    if(m.phasen.includes(A.phase)) p+=3;
    else if((PHASEN_NACHBARN[A.phase]||[]).some(n=>m.phasen.includes(n))) p+=1.2;
    else p-=2.5;
    if(m.ebenen.includes(A.ebene)) p+=2; else p-=1.5;
    p += m.modi.filter(x=>zm.includes(x)).length * 2.2;
    if(m.vertrauensbildend||m.modi.includes("verbindung")||m.modi.includes("vertrauen")) p+=1.1;
    p += m.stil.filter(x=>A.haltung.includes(x)).length * 1.6;
    if(genervt){ if(m.stil.includes("gespraechsnah")||m.stil.includes("schriftlich")||m.stil.includes("strukturiert")) p+=1.4;
                 if(m.stil.includes("spielerisch")||m.stil.includes("koerperlich")) p-=2.2; }
    if(A.stimmung==="belastet" && m.stil.includes("spielerisch")) p-=2.5;
    if((A.energie==="muede"||A.energie==="serie") && m.energie==="aktivierend") p+=0.8;
    if(A.stimmung==="angespannt" && m.energie==="beruhigend") p+=0.8;
    if(A.ort==="online"){ if(m.online==="ja") p+=0.6; else p-=0.8; }
    if(!spaet) p -= SO_RANG[m.selbstoeffnung]*0.9;
    if(zm.includes("entscheidung") && m.modi.includes("entscheidung")) p += spaet ? 1.4 : -1.4;
    if(A.appetit==="voll" && m.stil.includes("spielerisch") && A.stimmung!=="belastet" && !genervt) p+=0.8;
    return p;
  };
  return liste.map(m=>({m, p:punkte(m)})).sort((a,b)=>b.p-a.p);
}

/* Bestplatzierten Kandidaten deterministisch wählen */
function ziehe(kand){
  if(kand.length===0) return null;
  return {m:kand[0].m, p:kand[0].p};
}

/* Kleine Idee für Rahmen-Slots (Check-in, Energiemoment, Check-out) */
function ideeFuer(slot, schonGewaehlt){
  const typ = {ankommen:["einstieg"], energiemoment:["energizer"], checkout:["abschluss"], feedback:["abschluss","reflexion"], ernte:["reflexion"]}[slot];
  if(!typ) return null;
  if(A.anlassTyp==="krisensitzung") return null;                       // Krise: kein Methoden-Schmuck
  if(["zu_zweit","klein"].includes(groessenKlasse()) && slot==="ankommen" && A.appetit==="wenig") return null;
  const g = groesse();
  const k = METHODEN.filter(m=>{
    if(UMBRELLA.has(m.id)||schonGewaehlt.has(m.id)) return false;
    if(m.typ==="haltung"||m.typ==="rahmenmodell") return false;
    if(A.ort!=="online" && NUR_ONLINE.has(m.id)) return false;
    if(!m.blocktyp.some(t=>typ.includes(t))) return false;
    if(m.dauer_min>12) return false;
    if(!passtGroesse(m,g)) return false;
    if(A.ort==="online" && (m.online==="nein"||m.braucht_raum)) return false;
    if(SO_RANG[m.selbstoeffnung]>1) return false;
    if((A.stimmung==="belastet"||A.stimmung==="genervt") && m.stil.includes("spielerisch")) return false;
    return true;
  }).sort((a,b)=>{
    const s = m => (m.vertrauensbildend?1:0) + (m.energie==="aktivierend"&&slot==="energiemoment"?2:0) + ((m.anlass_typen||[]).includes(A.anlassTyp)?1.5:0) + (m.stil.includes(A.haltung[0])?1:0) - SO_RANG[m.selbstoeffnung]*0.5;
    return s(b)-s(a);
  });
  return k[0]||null;
}

/* Eine Brille für diesen Tag: max. 1 Rahmenmodell/Haltung als Hintergrund-Kasten */
function brilleFuerTag(){
  const kand = METHODEN.filter(m=>(m.typ==="haltung"||m.typ==="rahmenmodell") && (m.anlass_typen||[]).includes(A.anlassTyp));
  if(!kand.length) return null;
  const score = m => ((m.phasen||[]).includes(A.phase)?2:0) + (stimmungDatenWerte().some(s=>methodeStimmungen(m).includes(s))?1:0) + (m.modi.filter(x=>zielModi().includes(x)).length);
  kand.sort((a,b)=>score(b)-score(a));
  return kand[0];
}

/* „Warum das hier“: der wann_passt-Satz mit dem besten Situations-Match */
function warumSatz(m){
  const wp = m.wann_passt||[];
  if(!wp.length) return null;
  const begriffe = [ANLASS_KURZ[A.anlassTyp]||"", A.anlass||"", A.ziel||""].join(" ").toLowerCase().split(/[^a-zäöüß]+/).filter(w=>w.length>4);
  let best = wp[0], bestN = -1;
  wp.forEach(s=>{
    const sl = s.toLowerCase();
    const n = begriffe.filter(w=>sl.includes(w)).length;
    if(n>bestN){ bestN=n; best=s; }
  });
  return best;
}
/* Achtung-Zeile: wann_nicht nur, wenn er die aktuelle Situation berührt */
function achtungSatz(m){
  const wn = m.wann_nicht||[];
  if(!wn.length) return null;
  const lagen = [];
  if(A.vertrauen==="belastet"||A.vertrauen==="duenn"||A.stimmung==="belastet") lagen.push(/vertrau|belast|eskal|konflikt|verletz|unsicher/i);
  if(A.ort==="online") lagen.push(/online|virtuell|präsenz|raum/i);
  if(["gross","sehr_gross"].includes(groessenKlasse())) lagen.push(/großgrupp|grosse grupp|über \d+|mehr als \d+/i);
  if(A.stimmung==="genervt") lagen.push(/müde|method|skeptisch|kennt/i);
  if(A.energie==="muede"||A.energie==="serie") lagen.push(/müde|abend|energie/i);
  if((A.dauer==="m60")) lagen.push(/zeitdruck|wenig zeit|kurz/i);
  for(const s of wn){ if(lagen.some(re=>re.test(s))) return s; }
  return null;
}

/* ---------- Bogen bauen (Gruppen-Pfad) ---------- */
function baueBogen(){
  const rawSlots = baueSchablone();
  // Kern-Methoden auf max. 3 begrenzen
  let _uc = 0;
  const slots = rawSlots.filter(s => {
    if(s.slot==="uebung"||s.slot==="uebung2"){ _uc++; return _uc<=3; }
    return true;
  });
  const gewaehlt = new Set();
  let start = A.von || (["tag","t15","t2","halbtag"].includes(A.dauer) ? "09:00" : "10:00");
  let clock = zuMinuten(start);
  const ergebnis = [];
  let uebungNr = 0, ersterTag = true, letzterTag = !["t15","t2"].includes(A.dauer);

  const uebungSlots = slots.filter(x=>x.slot==="uebung"||x.slot==="uebung2").length;

  for(const s of slots){
    if(s.tag){ ergebnis.push({tag:s.tag}); clock = zuMinuten("09:00"); ersterTag = (s.tag===1); letzterTag = (s.tag>=2 || A.dauer==="tag"); continue; }
    const e = {slot:s.slot, label:s.label, von:vonMinuten(clock), bis:vonMinuten(clock+s.min), min:s.min};
    clock += s.min;

    if(s.slot==="pause"||s.slot==="mittag"){ e.pause=true; ergebnis.push(e); continue; }

    if(s.slot==="uebung"||s.slot==="uebung2"){
      uebungNr++;
      const key = "u"+uebungNr;
      const spaet = uebungNr > Math.max(1, Math.ceil(uebungSlots/2));
      const kand = kandidatenFuerUebung(s.slot==="uebung2"?15:Math.round(s.min*0.7), gewaehlt, spaet);

      if(A.appetit==="wenig"){
        // Strukturiertes Gespräch statt Voll-Übung: Fokusfragen der bestplatzierten Methode
        const best = kand.length?kand[0].m:null;
        e.kerngespraech = true; e.methodeLeise = best;
        e.label = "Strukturiertes Gespräch";
        ergebnis.push(e); if(best) gewaehlt.add(best.id); continue;
      }
      if(kand.length===0 || kand[0].p < -1){
        e.offen = true; e.kandidaten = kand.slice(0,2).map(k=>k.m);
        ergebnis.push(e); continue;
      }
      const z = ziehe(kand);
      e.methode = z.m; gewaehlt.add(z.m.id);
      e.uebungNr = uebungNr;
      ergebnis.push(e); continue;
    }

    // Rahmen-Slot
    e.rahmen = true;
    e.text = slotText(s.slot, ctx(ersterTag, letzterTag));
    if(s.slot==="zweck"){
      e.fragen = (ZWECK_FRAGEN_ANLASS[A.anlassTyp]||[]).slice(0,2);
    }
    const idee = ideeFuer(s.slot, gewaehlt);
    if(idee && (s.slot==="ankommen"||s.slot==="energiemoment"||s.slot==="checkout"||s.slot==="feedback")){
      e.idee = idee; gewaehlt.add(idee.id);
    }
    ergebnis.push(e);
  }
  return ergebnis;
}
function zuMinuten(hhmm){const[h,m]=hhmm.split(":").map(Number);return h*60+m;}
function vonMinuten(min){min=min%(24*60);return String(Math.floor(min/60)).padStart(2,"0")+":"+String(min%60).padStart(2,"0");}

/* Begleitende Strukturen (ganz-/mehrtägig) */
function begleitStrukturen(){
  if(!["tag","t15","t2"].includes(A.dauer)) return [];
  const find = re => METHODEN.find(m=>re.test(m.name));
  const liste = [{
    name:"Gemeinsame Verabredungen", text:"Zu Beginn 5 Minuten: Was ist uns für die gemeinsame Zeit wichtig? 3–5 Punkte sichtbar festhalten (z.B. ausreden lassen, Handys beiseite, Vertraulichkeit). Die Gruppe formuliert selbst – das trägt mehr als vorgegebene Regeln.", quelle:null
  }];
  const p = find(/parkplatz|parking/i);
  if(p) liste.push({name:p.name, text:p.kurz+" Einmal erklären, gut sichtbar aufhängen – und am Ende gemeinsam leeren: Was davon braucht einen Termin?", quelle:(p.quellen||[]).find(q=>q.url)});
  if(groesse().bis>=10){ const elmo = find(/elmo/i); if(elmo) liste.push({name:elmo.name, text:elmo.kurz, quelle:(elmo.quellen||[]).find(q=>q.url)}); }
  return liste;
}

/* Breakout-Empfehlung: rechnet mit beiden Enden der Spanne */
function breakoutText(m){
  const g = groesse();
  if(g.bis < 7) return null;
  if(m.gruppe_min > 6) return null;
  const ideal = Math.min(Math.max(m.gruppe_min,3),5);
  const onlineZusatz = A.ort==="online"?" (Breakout-Räume vorab anlegen, Aufgabe zusätzlich in den Chat – das spart 5 nervöse Minuten)":"";
  const rech = n => Math.max(2, Math.round(n/ideal));
  if(g.von===g.bis){
    const gr = rech(g.von);
    if(gr<2) return null;
    return `Bei ${g.von} Personen: z.B. ${gr} Gruppen à ${Math.floor(g.von/gr)}–${Math.ceil(g.von/gr)}${onlineZusatz}.`;
  }
  const grV = rech(g.von), grB = rech(g.bis);
  if(grV===grB) return `Bei ${g.von}–${g.bis} Personen: ${grV} Gruppen à ${Math.floor(g.von/grV)}–${Math.ceil(g.bis/grV)}${onlineZusatz}.`;
  return `Je nachdem, wie viele kommen, kippt der Zuschnitt: bei ${g.von} Personen ${grV} Gruppen à ~${Math.round(g.von/grV)}, bei ${g.bis} Personen ${grB} Gruppen à ~${Math.round(g.bis/grB)}. Beide Varianten vorbereiten${onlineZusatz}.`;
}
function ernteFragen(){
  return (ERNTE_FRAGEN_ANLASS[A.anlassTyp]||["Was ist dir klarer geworden?","Was nimmst du mit?"]).slice(0,3);
}
function uebungPhasen(e){
  const t = e.min;
  const erkl = Math.max(5, Math.round(t*0.18));
  const ernte = Math.max(5, Math.round(t*0.22));
  const durch = t - erkl - ernte;
  return {erkl, durch, ernte};
}

/* ---------- Gesprächsleitfaden bauen (Gesprächs-Pfad) ---------- */
function baueLeitfaden(){
  const art = gespraechsArt();
  const T = GESPRAECH_TEXTE[art];
  const dauer = parseInt(A.g4Dauer||"45",10);
  const wissen = A.g2Wissen||"unklar";
  // Zeitanteile: Eröffnung ~10%, Kern ~50%, Vereinbarung ~25%, Abschluss ~15%
  const z = n => Math.max(2, Math.round(dauer*n));
  const bloecke = [];
  bloecke.push({titel:"Vorbereitung – vor dem Gespräch", vor:true, punkte:T.vorbereitung});
  bloecke.push({titel:"Eröffnung", min:z(0.1), saetze:T.eroeffnung[wissen]||T.eroeffnung.unklar,
    text:(art==="kuendigung")?"Direkteinstieg – kein Smalltalk, keine Frage nach dem Wochenende: Das schafft falsche Erwartungen und verlängert die Qual. Die Nachricht gehört in die ersten 60 Sekunden.":null});
  bloecke.push({titel:"Kern", min:z(0.5), text:T.kern});
  bloecke.push({titel:"Vereinbarung / nächste Schritte", min:z(0.25), text:T.vereinbarung});
  bloecke.push({titel:"Abschluss in Würde", min:z(0.15), text:T.abschluss});
  bloecke.push({titel:"Nachsorge – nach dem Gespräch", nach:true, text:T.nachsorge});
  // Werkzeuge als Haltungs-Stützen
  const mapAnlass = (art==="konflikt")?"konfliktklaerung":(art==="coaching"?"coaching":"schwieriges_gespraech");
  const bevorzugt = ["empathisches-zuhoeren","nvc-4-schritte","systemische-fragetechniken","selbstempathie-pause","empathic-deep-listening","bitte-vs-forderung","auftragsklaerung-kontrakt"];
  const wkz = METHODEN.filter(m=>m.typ==="werkzeug" && (m.anlass_typen||[]).includes(mapAnlass))
    .sort((a,b)=>{
      const s = m => (bevorzugt.indexOf(m.id)>=0 ? (10-bevorzugt.indexOf(m.id)) : 0) + (m.beispiel?2:0);
      return s(b)-s(a);
    }).slice(0,2);
  return {art, T, dauer, bloecke, werkzeuge:wkz, durchatmen:dauer>=90};
}

/* ---------- Übungs-Box V2 ---------- */
function uebungBox(e){
  const m = e.methode, ph = uebungPhasen(e), bo = breakoutText(m);
  const warum = warumSatz(m), achtung = achtungSatz(m);
  const fokus = (m.fokusfragen||[]).slice(0,3);
  const ef = fokus.length?[]:ernteFragen();
  return `<div class="uebung"><div class="ukopf"><span class="zeit">${e.von}–${e.bis}</span><span class="dauer">${e.min} Min</span><span class="uname">${m.name}</span><span class="ulabel">${e.label}</span></div>
    <p class="kurz">${esc(m.kurz)}</p>
    ${warum?`<div class="warum"><b>Warum das hier:</b> ${esc(warum)}</div>`:""}
    <p class="phasenzeile">Grobe Aufteilung: ~${ph.erkl} Min Hinführung & Erklärung (Rückfragen ausdrücklich erwünscht) · ~${ph.durch} Min Durchführung · ~${ph.ernte} Min Ernte & Austausch</p>
    ${(m.typ==="werkzeug" && m.beispiel)?`<h4>So klingt das konkret</h4><p class="kurz">${esc(m.beispiel)}</p>`:""}
    <h4>So gehst du vor</h4>
    <ol>${m.schritte.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>
    ${bo?`<h4>Gruppen</h4><p class="kurz">${esc(bo)}</p>`:""}
    ${fokus.length?`<h4>Fokusfragen für diese Methode</h4><ul>${fokus.map(f=>`<li>${esc(f)}</li>`).join("")}</ul>`:""}
    ${ef.length?`<h4>Fragen für die Ernte danach</h4><ul>${ef.map(f=>`<li>${esc(f)}</li>`).join("")}</ul>`:""}
    ${m.mini_form?`<h4>Wenn du es kleiner willst</h4><p class="kurz">${esc(m.mini_form)}</p>`:""}
    ${m.hinweise?`<h4>Worauf du achten solltest</h4><p class="kurz">${esc(m.hinweise)}</p>`:""}
    ${achtung?`<p class="achtung"><b>Achtung in deiner Lage:</b> ${esc(achtung)}</p>`:""}
    <p class="quel"><b>Zum Vertiefen:</b> ${quellenHtml(m)}</p>
  </div>`;
}
/* Strukturiertes Gespräch (Methoden-Appetit „so wenig wie möglich“) */
function kernGespraechBox(e){
  const m = e.methodeLeise;
  const fokus = m ? (m.fokusfragen||[]).slice(0,3) : [];
  const fragen = fokus.length?fokus:ernteFragen();
  return `<div class="uebung"><div class="ukopf"><span class="zeit">${e.von}–${e.bis}</span><span class="dauer">${e.min} Min</span><span class="uname">Strukturiertes Gespräch</span><span class="ulabel">${e.label}</span></div>
    <p class="kurz">Du wolltest so wenig Methode wie möglich – also trägt hier das Gespräch selbst, gehalten von wenigen guten Fragen. Keine Methode ankündigen, einfach fragen, zuhören, nachfassen. Erst alle Sichten sammeln, dann ordnen, dann erst Richtung Ergebnis.</p>
    <h4>Drei Fragen als Gerüst</h4>
    <ul>${fragen.map(f=>`<li>${esc(f)}</li>`).join("")}</ul>
    ${m&&m.mini_form?`<h4>Wenn du doch ein kleines Element magst</h4><p class="kurz">${esc(m.mini_form)}${m.name?` <i>(aus: ${esc(m.name)})</i>`:""}</p>`:""}
    ${m?`<p class="quel"><b>Die Fragen stammen aus:</b> ${esc(m.name)} – ${quellenHtml(m)}</p>`:""}
  </div>`;
}
/* Eine Brille für diesen Tag (Rahmenmodell / Haltung als Hintergrund) */
function brilleBox(m){
  if(!m) return "";
  let text = m.kurz||"";
  if(text.length>320) text = text.slice(0,317)+"…";
  const q = (m.quellen||[]).find(x=>x.url) || (m.quellen||[])[0];
  return `<div class="brille"><span class="blabel">Eine Brille für diesen Tag · Hintergrund, keine Übung</span>
    <div class="btitel">${m.name}</div>
    <p>${esc(text)}</p>
    ${m.beispiel?`<p class="hint">${esc(m.beispiel.length>200?m.beispiel.slice(0,197)+"…":m.beispiel)}</p>`:""}
    ${q?`<p class="quel"><b>Quelle:</b> ${q.url?`<a href="${q.url}" target="_blank" rel="noopener">${esc(q.titel)}</a>`:esc(q.titel)}</p>`:""}
  </div>`;
}

    if(e.tag){blocks+=`<div class="tagkopf">Tag ${e.tag}</div>`;return;}

    if(e.offen){
      blocks+=`<div class="uebung offen"><div class="ukopf"><span class="zeit">${e.von}–${e.bis}</span><span class="dauer">${e.min} Min</span><span class="uname">Noch offen: ${e.label}</span></div>

    blocks+=`<div class="block"><div class="kopf"><span class="zeit">${e.von}–${e.bis}</span><span class="dauer">${e.min} Min</span><span class="titel">${e.label}</span></div>

  M.innerHTML = `${progressHtml()}

    Energie: ${ENERGIEN[A.energie]||""} · Stimmung: ${STIMMUNGEN[A.stimmung]||""}<br>
    <b>Ziel:</b> ${esc(A.ziel)}${A.ergebnistypen.length?" — "+A.ergebnistypen.filter(t=>ERGEBNISTYPEN[t]).map(t=>ERGEBNISTYPEN[t].label).join(", "):""}
  </div>
  ${brilleBox(brille)}
  ${begleit.length?`<div class="begleit"><h3>Begleitende Strukturen – einmal erklärt, gelten den ganzen Tag</h3><ul>${begleit.map(b=>`<li><b>${b.name}:</b> ${esc(b.text)}${b.quelle?` (<a href="${b.quelle.url}" target="_blank" rel="noopener">mehr</a>)`:""}</li>`).join("")}</ul></div>`:""}

  const zweitButton = frei
    ? `<button class="secondary" onclick="A=leereAntworten();schritt=0;try{localStorage.removeItem(LS_KEY)}catch(e){};window.scrollTo(0,0);render()">Neue Session planen</button>`
    : `<button class="secondary" onclick="location.href='../kontakt.html'">Weitere Session planen? Kontaktiere uns</button>`;
  return `<div class="aktionen">
    <button class="primary" onclick="downloadPdf(this)">Download</button>
    ${zweitButton}
  </div>`;
}

/* ---------- Ein-Klick-PDF (html2pdf, kein Druckdialog) ---------- */
function downloadPdf(btn){
  if(typeof html2pdf === "undefined"){ // Fallback, falls CDN nicht geladen
    window.print(); return;
  }
  const label = btn ? btn.textContent : "";
  if(btn){ btn.disabled = true; btn.textContent = "PDF wird erstellt …"; }
  const klon = document.getElementById("main").cloneNode(true);
  klon.querySelectorAll(".progress,.aktionen,.nav,.fussnote").forEach(el=>el.remove());
  const pk = klon.querySelector(".printkopf"); if(pk) pk.style.display = "flex";
  const wrap = document.createElement("div");
  wrap.className = "pdfdoc";
  wrap.style.cssText = "position:fixed;left:-99999px;top:0;width:760px;background:#fff;color:#1F1A14;padding:8px 4px;font-family:'Inter',system-ui,sans-serif";
  wrap.appendChild(klon);
  const st = document.createElement("style");
  st.textContent = `
    .pdfdoc .card,.pdfdoc .block,.pdfdoc .uebung,.pdfdoc .begleit{background:#fff;border-color:#ccc;box-shadow:none}
    .pdfdoc .uebung{border:1.5px solid #C9A961;border-left:5px solid #C9A961}
    .pdfdoc .block.pause{background:#f4f4f4}
    .pdfdoc .wsatz,.pdfdoc .uebung .warum{background:#f4f4f4}
    .pdfdoc .brille{background:#fff;border-color:#4A2B5C}
    .pdfdoc .kontextzeile{background:#fff;color:#1F1A14;border:1.5px solid #C9A961}
    .pdfdoc .kontextzeile b{color:#8A5E3B}
    .pdfdoc .cta{background:#fff;color:#1F1A14;border:1.5px solid #C9A961}
    .pdfdoc .cta .ctitel{color:#8A5E3B}
    .pdfdoc .cta a{color:#1F1A14}
    .pdfdoc .printkopf{display:flex;align-items:center;gap:10px;border-bottom:1.5px solid #C9A961;padding-bottom:8px;margin-bottom:16px}
    .pdfdoc .printkopf .wm{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:20px}
    .pdfdoc .printkopf .wm .up{color:#C9A961}
    .pdfdoc .printkopf .tg{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#555;margin-left:auto}
    .pdfdoc .printkopf svg{width:30px;height:30px}
  `;
  document.head.appendChild(st);
  document.body.appendChild(wrap);
  const datum = new Date().toISOString().slice(0,10);
  const opt = {
    margin: [10,10,12,10],
    filename: `session-ablauf-${datum}.pdf`,
    image: {type:"jpeg", quality:0.96},
    html2canvas: {scale:2, useCORS:true, backgroundColor:"#ffffff"},
    jsPDF: {unit:"mm", format:"a4", orientation:"portrait"},
    pagebreak: {mode:["css","legacy"], avoid:[".uebung",".block",".brille",".cta",".kontextzeile"]}
  };
  const done = ()=>{ wrap.remove(); st.remove(); if(btn){ btn.disabled=false; btn.textContent=label; } };
  html2pdf().set(opt).from(klon).save().then(done).catch(done);
}

/* ---------- Run-Zähler ---------- */
function zaehleRun(){
  if(_runCounted) return;
  _runCounted = true;
  const n = parseInt(localStorage.getItem(LS_RUNS)||"0",10);
  localStorage.setItem(LS_RUNS, String(n+1));
}

window.addEventListener("beforeprint",()=>document.querySelectorAll("details").forEach(d=>d.open=true));
render();
